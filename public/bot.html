<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DBRIDGE - Headless Bot</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background: #020617;
            color: #38bdf8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #log {
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 15px;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }

        .status {
            padding: 10px;
            border-radius: 8px;
            background: #1e293b;
            font-weight: bold;
        }

        .connected {
            color: #4ade80;
        }

        .disconnected {
            color: #f87171;
        }
    </style>
</head>

<body>
    <h1>3DBRIDGE - MEGASCANS BOT</h1>
    <div id="status" class="status disconnected">Status: Disconnected</div>
    <div id="log"></div>

    <script>
        const BOT_PEER_ID = 'bot-mega-123';
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `[${time}] ${msg}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        let peer = null;
        let connections = new Map();

        function initBot() {
            log('Starting MegascansBot...');

            peer = new Peer(BOT_PEER_ID, {
                debug: 2
            });

            peer.on('open', (id) => {
                log(`Connected as: ${id}`);
                statusEl.textContent = 'Status: Connected (Listening)';
                statusEl.className = 'status connected';
            });

            peer.on('error', (err) => {
                log(`Error: ${err.type}`);
                if (err.type === 'unavailable-id') {
                    log('Fatal: ID bot-mega-123 already taken. Is another bot running?');
                }
            });

            peer.on('connection', (conn) => {
                log(`Incoming connection from: ${conn.peer}`);

                conn.on('open', () => {
                    log(`Data channel open with ${conn.peer}`);
                    connections.set(conn.peer, conn);
                });

                conn.on('data', (data) => {
                    log(`Data received from ${conn.peer}: ${JSON.stringify(data)}`);

                    // Handle JSON request
                    if (data.type === 'REQUEST_ASSET') {
                        log(`Asset requested by ${conn.peer}. Sending mock data...`);
                        conn.send({
                            type: 'ASSET_RESPONSE',
                            assetId: data.assetId,
                            data: {
                                name: "Megascans Dummy Asset",
                                type: "surface",
                                data: "BASE64_MOCK_DATA_HERE"
                            }
                        });
                    }
                });

                conn.on('close', () => {
                    log(`Connection closed by ${conn.peer}`);
                    connections.delete(conn.peer);
                });
            });

            // Mocking Chat Message Observation (In a real app, this would use a socket or polling)
            // For now, we simulate receiving commands via the Data Channel as well
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'CHAT_COMMAND') {
                        const { command, args, sender } = data;
                        handleCommand(command, args, sender, conn);
                    }
                });
            });
        }

        function handleCommand(command, args, sender, conn) {
            log(`Command received: ${command} from ${sender}`);

            if (command === '/Exterminate') {
                log('EXTERMINATE RECEIVED. RESYNCING...');
                conn.send({ type: 'CHAT_MSG', content: 'SYSTEM: LOG OUT REQUESTED. DISCONNECTING...' });
                setTimeout(() => {
                    peer.destroy();
                    statusEl.textContent = 'Status: Disconnected (Exterminated)';
                    statusEl.className = 'status disconnected';
                    log('Bot logic stopped.');
                }, 1000);
            } else if (command === '/script') {
                const scriptName = args[0] || 'unknown';
                log(`Executing script: ${scriptName}`);
                conn.send({ type: 'CHAT_MSG', content: `BOT: Running script "${scriptName}"...` });
                // Simulate script results
                setTimeout(() => {
                    conn.send({ type: 'CHAT_MSG', content: `BOT: Script "${scriptName}" completed successfully.` });
                }, 2000);
            }
        }

        // Start
        initBot();
    </script>
</body>

</html>
